worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    upstream customer_service {
        server customer_service:8001;
    }

    upstream staff_service {
        server staff_service:8002;
    }

    upstream laptop_service {
        server laptop_service:8003;
    }

    upstream mobile_service {
        server mobile_service:8004;
    }

    server {
        listen 80;
        server_name localhost;

        location /customer/ {
            proxy_pass http://customer_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            rewrite ^/customer/(.*)$ /$1 break;
        }

        location /staff/ {
            proxy_pass http://staff_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            rewrite ^/staff/(.*)$ /$1 break;
        }

        location /laptop/ {
            proxy_pass http://laptop_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            rewrite ^/laptop/(.*)$ /$1 break;
        }

        location /mobile/ {
            proxy_pass http://mobile_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            rewrite ^/mobile/(.*)$ /$1 break;
        }
    }
}