services:
  db_mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_MYSQL_DATABASE}
      MYSQL_USER: ${DB_MYSQL_USER}
      MYSQL_PASSWORD: ${DB_MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - my_network

  db_postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${DB_POSTGRES_DB}
      POSTGRES_USER: ${DB_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - my_network

  customer_service:
    build: ./customer_service
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - ./customer_service:/app
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      - db_mysql
    networks:
      - my_network

  staff_service:
    build: ./staff_service
    command: python manage.py runserver 0.0.0.0:8002
    volumes:
      - ./staff_service:/app
    ports:
      - "8002:8002"
    env_file:
      - .env
    depends_on:
      - db_mysql
    networks:
      - my_network

  laptop_service:
    build: ./laptop_service
    command: python manage.py runserver 0.0.0.0:8003
    volumes:
      - ./laptop_service:/app
    ports:
      - "8003:8003"
    env_file:
      - .env
    depends_on:
      - db_postgres
    networks:
      - my_network

  mobile_service:
    build: ./mobile_service
    command: python manage.py runserver 0.0.0.0:8004
    volumes:
      - ./mobile_service:/app
    ports:
      - "8004:8004"
    env_file:
      - .env
    depends_on:
      - db_postgres
    networks:
      - my_network

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - customer_service
      - staff_service
      - laptop_service
      - mobile_service
    networks:
      - my_network

volumes:
  mysql_data:
  postgres_data:

networks:
  my_network:
    driver: bridge
