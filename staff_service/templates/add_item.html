<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Product</title>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 400px; }
        h1 { color: #28a745; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #218838; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #6c757d; text-decoration: none; }
    </style>
</head>
<body>
    <div style="position: absolute; top: 20px; right: 20px;">
        <a href="/customer/login/" class="btn btn-logout" style="background-color: #007bff; color: white; text-decoration: none; padding: 8px 16px; border-radius: 4px;">Log in as Guest</a>
    </div>
    <div class="form-container">
        <h1>Add New Product</h1>
        {% if error %}<p style="color: red;">{{ error }}</p>{% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Product Type</label>
                <select name="product_type" required>
                    <option value="" disabled selected>Select Type</option>
                    <option value="laptop">Laptop</option>
                    <option value="mobile">Mobile</option>
                </select>
            </div>
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" required value="{{ data.name }}">
            </div>
            <div class="form-group">
                <label>Brand</label>
                <input type="text" name="brand" required value="{{ data.brand }}">
            </div>
            <div class="form-group">
                <label>Price ($)</label>
                <input type="number" step="0.01" name="price" required value="{{ data.price }}">
            </div>
            <div class="form-group">
                <label>Stock</label>
                <input type="number" name="stock" required value="{{ data.stock }}">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="3">{{ data.description }}</textarea>
            </div>
            <button type="submit">Create Product</button>
        </form>
        <a href="/staff/" class="back-link">Back to Dashboard</a>
    </div>
</body>
</html>
